name: OzParts to CloudCart sync

on:
  schedule:
    # Every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sync_ozparts.py'
      - 'translations.py'
      - 'deepl_translator.py'
      - '.github/workflows/sync.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          # Pricing
          MARGIN_PCT: "30"
          SUPPLIER_DISCOUNT: "20"
          VAT_PCT: "20"
          PRICE_ROUND: "whole"
          # Shipping
          SHIPPING_PER_KG: "2.00"
          SHIPPING_MIN: "1.50"
          SHIPPING_FALLBACK: "3.00"
          # Output
          OUT_DIR: "./docs"
          UPLOAD_DEST: "local"
          # DeepL translation
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPL_BUDGET_PER_RUN: "100000"
          DEEPL_CACHE_PATH: "cache/translations.json"
        run: python sync_ozparts.py

      - name: Commit & push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p cache
          git add docs/cloudcart_feed.xml docs/vehicle_index.json docs/vehicle_index.json.gz cache/translations.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto-sync $(date -u +%FT%TZ)"
          git push
